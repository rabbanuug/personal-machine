# Expose GNOME keyring socket to the systemd user session so all GUI apps
# (including Claude Code launched from the app launcher) can reach libsecret.
# systemd evaluates %t as XDG_RUNTIME_DIR (e.g. /run/user/1000).
GNOME_KEYRING_CONTROL=%t/keyring
You're running in a GNOME environment but the OS keyring is not available for encryption. Ensure you have gnome-keyring or another libsecret compatible implementation installed and running.